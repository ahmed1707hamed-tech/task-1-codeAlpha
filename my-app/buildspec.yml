version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin YOUR_ECR_URI

  build:
    commands:
      - echo Building Docker image...
      - docker build -t my-app .
      - docker tag my-app:latest YOUR_ECR_URI:latest

  post_build:
    commands:
      - echo Pushing image...
      - docker push 475411231343.dkr.ecr.us-east-1.amazonaws.com/my-app